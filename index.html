<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Product-card</title>
  <link rel="stylesheet" href="styles.css">
</head>
  <body class="body">
    <div class="bg-dandelions">
      <img src="/images/bg-dandelions.png" class="bg-dandelions__img">
    </div>
    <h1 class="title"> Выбери свой продукт</h1>
    <div class="buttons">
      <button id="recolor-first-card-button">Перекрасить фон перавой карточки</button>
      <button id="recolor-all-cards-button">Перекрасить фон всех карточек</button>
      <button id="open-google-button">Открыть Google</button>
      <button id="recolor-button" class="green_bg">Перекрась меня</button>
      <button class="registration-button">Регистрация</button>
    </div>
    <div class="overlay modal">
      <div class="modal-window">
        <button class="modal-close-button">×</button>
        <h2 class="modal-title">Регистрация</h2>
        <form action="" class="registration-form">
          <label>
            Имя
            <input type="text" name="firstName" placeholder="Введите имя" required minlength="2">
          </label>
          <label>
            Фамилия
            <input type="text" name="lastName" placeholder="Введите фамилию" required minlength="2">
          </label>
          <label>
            Дата рождения
            <input type="date" name="birthDate" required>
          </label>
          <label>
            Логин
            <input type="text" name="login" placeholder="Введите логин" required minlength="4">
          </label>
          <label>
            Пароль
            <input type="password" name="password" placeholder="Введите пароль" required minlength="8">
          </label>
          <label>
            Повторите пароль
            <input type="password" name="repeatPassword" placeholder="Повторите пароль" required minlength="8">
          </label>
          <button type="submit" class="registration-submit-button">
            Зарегистрироваться
          </button>
        </form>
      </div>
    </div>

    <div class="product-card__wrapper">
      <template class="product-card__template">
      <div class="product-card">
        <img src="" class="product-card__image">
        <p class="product-card__skin-type"></p>
        <h3 class="product-card__name"></h3>
        <p class="product-card__description"></p>
        <div class="product-card__all-ingridients">
          <span class="product-card__ingridients">Состав:</span>
            <ul class="product-card__items-wrapper"></ul>
        </div>
        <div class="product-card__price-wrapper">
          <span class="product-card__price-text">Цена</span>
          <span class="product-card__price"></span>
        </div>
      </div>
      </template>
    </div>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-left">
        <h2>Product Cards</h2>
        <p>У Нас Самые Лучшие Продукты Для Кожи!</p>
          <div class="footer__socials">
            <ul class="footer__social-networks">
              <li class="footer__social-item">
                <a href="#" target="_blank" rel="noopener noreferrer" class="footer__social-link">
                <img src="images/tg-icon.svg" alt="Мы в Telegram" class="footer__social-icon">
                </a>
              </li>
              <li class="footer__social-item">
                <a href="#" target="_blank" rel="noopener noreferrer" class="footer__social-link">
                <img src="images/vk-icon.svg" alt="Мы в VK" class="footer__social-icon">
                </a>
              </li>
            </ul>
          </div>
        </div>
        <div class="footer-center">
        <h3>Подпишись на наши акции!</h3>
          <form class="subscribe-form">
            <input id="email" class="footer__form-input" name="email" type="email" placeholder="Введи Email..." required autocomplete="email">
            <button class="footer__form-button" type="submit">Подписаться</button>
          </form>
        </div>
        <div class="footer-right">
          <nav class="footer__menu">
          <p class="footer__menu-title">Быстрые ссылки</p>
            <ul class="footer__menu-list">
              <li class="footer__menu-item"><a href="#">Главная</a></li>
              <li class="footer__menu-item"><a href="#">Магазин</a></li>
              <li class="footer__menu-item"><a href="#">Контакты</a></li>
            </ul>
          </nav>
        </div>
      </div>
      <div class="footer__link-site">
        <img src="images/footer-line.svg">
        <p class="footer__address">www.product-cards.com©all right reserve</p>
      </div>
    </footer>
    <script src="/java-script/script.js"></script>
    <script src="/java-script/homework-5.js"></script>
    <script src="/java-script/homework-6.js"></script>
    <script src="/java-script/homework-7.js" type="module"></script>
    <script src="./java-script/homework-8.js" type="module"></script>
    <script src="./java-script/homework-9.js"></script>
</body>
</html>
